version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-tester-backend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: sqlite:///app_tester.db
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    command: python backend/app.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app-tester-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000

volumes:
  db_data:
